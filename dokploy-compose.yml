services:
  postgres:
    image: postgres:15-alpine
    container_name: mikrotik-db
    environment:
      POSTGRES_DB: mikrotik_config_builder
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mikrotik-net

  app:
    build:
      context: .
      dockerfile: Dockerfile.dokploy
    container_name: mikrotik-app
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mikrotik_config_builder
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    expose:
      - "80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mikrotik-net
      - dokploy-network

volumes:
  pgdata:

networks:
  mikrotik-net:
  dokploy-network:
    external: true
